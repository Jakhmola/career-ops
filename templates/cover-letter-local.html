<!doctype html>
<html lang="{{LANG}}">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>{{NAME}} — Cover Letter</title>
        <style>
            /* System sans stack, same as cv-template.html (ATS-safe: verified
               clean via pypdf text extraction; no font embedding). The CV + CL
               packet must read as one typographic set. */
            * {
              margin: 0;
              padding: 0;
              box-sizing: border-box;
              /* Disable fi/fl/ffi ligatures — PDF extractors decode the ligature
                 glyphs back to U+FB01.., so "verification" stops matching a
                 literal ATS keyword search. Same rule as cv-template.html. */
              font-variant-ligatures: none;
              font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
            }

            html {
              -webkit-print-color-adjust: exact;
              print-color-adjust: exact;
            }

            body {
              font-family: 'Liberation Sans', 'Helvetica Neue', Arial, 'DejaVu Sans', sans-serif;
              font-size: 13px;
              line-height: 1.5;
              color: #000000;
              background: #ffffff;
              padding: 0;
              margin: 0;
              font-variant-ligatures: none;
              font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
            }

            .page {
              width: 100%;
              max-width: {{PAGE_WIDTH}};
              margin: 0 auto;
              padding: 2px 0;
            }

            /* === HEADER (matches CV: centered block, navy name) === */
            .header {
              margin-bottom: 14px;
              text-align: center;
            }

            .header h1 {
              font-family: 'Liberation Sans', 'Helvetica Neue', Arial, 'DejaVu Sans', sans-serif;
              font-size: 28px;
              font-weight: 700;
              color: #1a3a5c;
              margin-bottom: 3px;
              line-height: 1.1;
            }

            /* Kept for generator markup compatibility; the finalized style has
               no gradient bar. */
            .header-gradient {
              display: none;
            }

            .contact-row {
              display: flex;
              flex-wrap: wrap;
              justify-content: center;
              gap: 2px 10px;
              font-family: 'Liberation Sans', 'Helvetica Neue', Arial, 'DejaVu Sans', sans-serif;
              font-size: 12px;
              line-height: 1.4;
              color: #333;
            }

            .contact-row a {
              color: #333;
              text-decoration: none;
            }

            .contact-row .separator {
              color: #999;
            }

            /* Links must never break across lines */
            a {
              white-space: nowrap;
            }

            /* === LETTER BODY === */
            .meta {
              font-size: 12px;
              color: #333;
              margin-bottom: 16px;
            }

            .recipient {
              font-size: 13px;
              color: #000;
              margin-bottom: 16px;
              line-height: 1.4;
            }

            .recipient .company {
              font-weight: 700;
              color: #000;
            }

            .greeting {
              font-size: 13px;
              color: #000;
              margin-bottom: 12px;
            }

            .letter-body p {
              font-size: 13px;
              line-height: 1.5;
              color: #000;
              margin-bottom: 12px;
              text-align: justify;
            }

            .signoff {
              font-size: 13px;
              color: #000;
              margin-top: 16px;
              margin-bottom: 0; /* name sits directly on the next line, like the recipient block */
            }

            .signature {
              font-size: 13px;
              font-weight: 700;
              color: #000;
            }

            @media print {
              body {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
              }
              /* Same right gutter as cv-template.html (#1341): right-edge glyph
                 side bearings can get clipped by Chromium's print clip. */
              .page { padding: 0 0.18in 0 0; }
            }
        </style>
    </head>
    <body>
        <div class="page">
            <!-- HEADER (identical to CV for a consistent application packet) -->
            <div class="header">
                <h1>{{NAME}}</h1>
                <div class="header-gradient"></div>
                <div class="contact-row">
                    <span>{{PHONE}}</span>
                    <span class="separator">|</span>
                    <span>{{EMAIL}}</span>
                    <span class="separator">|</span>
                    <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
                    <span class="separator">|</span>
                    <a href="{{PORTFOLIO_URL}}">{{PORTFOLIO_DISPLAY}}</a>
                    <span class="separator">|</span>
                    <span>{{LOCATION}}</span>
                    {{PERMIT_STATUS}}
                </div>
            </div>

            <!-- DATE -->
            <div class="meta">{{DATE}}</div>

            <!-- RECIPIENT -->
            <div class="recipient">{{RECIPIENT}}</div>

            <!-- GREETING -->
            <div class="greeting">{{GREETING}}</div>

            <!-- BODY: 3 short paragraphs -->
            <div class="letter-body">{{BODY}}</div>

            <!-- SIGN-OFF -->
            <div class="signoff">{{SIGNOFF}}</div>
            <div class="signature">{{SIGNATURE_NAME}}</div>
        </div>
    </body>
</html>
